name: Deploy Human Architect Site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          # Copy all root-level HTML, JS, CSS, images, and data files
          cp *.html *.js *.css *.webp *.png *.jpg *.jpeg *.svg *.ico *.json *.txt *.xml _site/ 2>/dev/null || true
          cp -r public _site/
          for dir in book-covers book-previews videos; do
            if [ -d "$dir" ]; then
              cp -r "$dir" _site/
              echo "Copied $dir/"
            fi
          done
          echo "Prepared site files for deployment"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
